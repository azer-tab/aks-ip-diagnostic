{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aks-ip-diagnostic.fullname" . }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aks-ip-diagnostic.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aks-ip-diagnostic.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aks-ip-diagnostic.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
