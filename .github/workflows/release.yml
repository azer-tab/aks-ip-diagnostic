name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          python -m compileall -q src tests examples
          pytest -q
          ruff check .
          ruff format --check .
          bandit -r src -x tests
          pip-audit
      - name: Build Python package
        run: |
          rm -rf dist build *.egg-info
          python -m build
          python -m twine check dist/*
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  dockerhub:
    runs-on: ubuntu-latest
    needs: build-python
    if: ${{ vars.PUBLISH_DOCKERHUB == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aks-ip-diagnostic:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/aks-ip-diagnostic:latest

  helm:
    runs-on: ubuntu-latest
    needs: build-python
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint charts/aks-ip-diagnostic
      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/aks-ip-diagnostic --destination dist
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
